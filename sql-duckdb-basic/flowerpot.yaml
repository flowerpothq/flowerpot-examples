schedule: "0 */6 * * *"

pipelines:
  create-tables:
    run: "duckdb data/analytics.duckdb < sql/create_tables.sql"

  load-seed:
    run: "duckdb data/analytics.duckdb < sql/load_seed.sql"
    after: [create-tables]

  transform:
    run: "duckdb data/analytics.duckdb < sql/transform.sql"
    after: [load-seed]
